apiVersion: batch/v1
kind: Job
metadata:
  name: dac-validate-dashboards
  namespace: dac
  labels:
    app.kubernetes.io/name: dac
    app.kubernetes.io/component: dac
    app.kubernetes.io/managed-by: autopoc
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 30
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dac
        app.kubernetes.io/component: dac
    spec:
      containers:
        - name: dac
          image: quay.io/aicatalyst/dac-dac:latest
          imagePullPolicy: Always
          command: ["dac"]
          args: ["validate", "--dir", "/app/examples/basic-yaml"]
          env:
            - name: TELEMETRY_OPTOUT
              value: "1"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      restartPolicy: Never
