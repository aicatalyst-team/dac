apiVersion: apps/v1
kind: Deployment
metadata:
  name: dac
  namespace: dac
  labels:
    app.kubernetes.io/name: dac
    app.kubernetes.io/component: dac
    app.kubernetes.io/managed-by: autopoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dac
      app.kubernetes.io/component: dac
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dac
        app.kubernetes.io/component: dac
    spec:
      containers:
        - name: dac
          image: quay.io/aicatalyst/dac-dac:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: TELEMETRY_OPTOUT
              value: "1"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
