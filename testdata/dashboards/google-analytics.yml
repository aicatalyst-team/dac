name: Google Analytics
description: Web analytics across Bruin properties
connection: gcp-default

filters:
  - name: property
    type: select
    default: "Bruin Cloud"
    options:
      values: ["Bruin Cloud", "Ingestr Docs", "Bruin Docs"]

  - name: date_range
    type: date-range
    default:
      start: "2025-06-01"
      end: "2026-03-06"

queries:
  total_page_views:
    sql: |
      SELECT COUNT(*) as value
      FROM `bruin-landing-page.{% if filters.property == 'Bruin Cloud' %}analytics_417958677{% elif filters.property == 'Ingestr Docs' %}analytics_428962930{% else %}analytics_469869843{% endif %}.events_intraday_*`
      WHERE event_name = 'page_view'
        AND PARSE_DATE('%Y%m%d', event_date) >= DATE('{{ filters.date_range.start }}')
        AND PARSE_DATE('%Y%m%d', event_date) <= DATE('{{ filters.date_range.end }}')

  total_users:
    sql: |
      SELECT COUNT(DISTINCT user_pseudo_id) as value
      FROM `bruin-landing-page.{% if filters.property == 'Bruin Cloud' %}analytics_417958677{% elif filters.property == 'Ingestr Docs' %}analytics_428962930{% else %}analytics_469869843{% endif %}.events_intraday_*`
      WHERE PARSE_DATE('%Y%m%d', event_date) >= DATE('{{ filters.date_range.start }}')
        AND PARSE_DATE('%Y%m%d', event_date) <= DATE('{{ filters.date_range.end }}')

  total_sessions:
    sql: |
      SELECT COUNT(*) as value
      FROM `bruin-landing-page.{% if filters.property == 'Bruin Cloud' %}analytics_417958677{% elif filters.property == 'Ingestr Docs' %}analytics_428962930{% else %}analytics_469869843{% endif %}.events_intraday_*`
      WHERE event_name = 'session_start'
        AND PARSE_DATE('%Y%m%d', event_date) >= DATE('{{ filters.date_range.start }}')
        AND PARSE_DATE('%Y%m%d', event_date) <= DATE('{{ filters.date_range.end }}')

  pages_per_session:
    sql: |
      SELECT ROUND(
        COUNTIF(event_name = 'page_view') * 1.0 / NULLIF(COUNTIF(event_name = 'session_start'), 0),
        1
      ) as value
      FROM `bruin-landing-page.{% if filters.property == 'Bruin Cloud' %}analytics_417958677{% elif filters.property == 'Ingestr Docs' %}analytics_428962930{% else %}analytics_469869843{% endif %}.events_intraday_*`
      WHERE PARSE_DATE('%Y%m%d', event_date) >= DATE('{{ filters.date_range.start }}')
        AND PARSE_DATE('%Y%m%d', event_date) <= DATE('{{ filters.date_range.end }}')

rows:
  - widgets:
      - name: Page Views
        type: metric
        query: total_page_views
        column: value
        format: number
        col: 3

      - name: Users
        type: metric
        query: total_users
        column: value
        format: number
        col: 3

      - name: Sessions
        type: metric
        query: total_sessions
        column: value
        format: number
        col: 3

      - name: Pages / Session
        type: metric
        query: pages_per_session
        column: value
        col: 3

  - widgets:
      - name: Daily Traffic
        type: chart
        chart: area
        col: 12
        sql: |
          SELECT
            PARSE_DATE('%Y%m%d', event_date) as date,
            COUNTIF(event_name = 'page_view') as page_views,
            COUNT(DISTINCT user_pseudo_id) as users
          FROM `bruin-landing-page.{% if filters.property == 'Bruin Cloud' %}analytics_417958677{% elif filters.property == 'Ingestr Docs' %}analytics_428962930{% else %}analytics_469869843{% endif %}.events_intraday_*`
          WHERE PARSE_DATE('%Y%m%d', event_date) >= DATE('{{ filters.date_range.start }}')
            AND PARSE_DATE('%Y%m%d', event_date) <= DATE('{{ filters.date_range.end }}')
          GROUP BY 1
          ORDER BY 1
        x: date
        y: [page_views, users]

  - widgets:
      - name: Traffic Sources
        type: chart
        chart: bar
        col: 4
        sql: |
          SELECT
            IFNULL(traffic_source.source, '(direct)') as source,
            COUNT(DISTINCT user_pseudo_id) as users
          FROM `bruin-landing-page.{% if filters.property == 'Bruin Cloud' %}analytics_417958677{% elif filters.property == 'Ingestr Docs' %}analytics_428962930{% else %}analytics_469869843{% endif %}.events_intraday_*`
          WHERE PARSE_DATE('%Y%m%d', event_date) >= DATE('{{ filters.date_range.start }}')
            AND PARSE_DATE('%Y%m%d', event_date) <= DATE('{{ filters.date_range.end }}')
          GROUP BY 1
          ORDER BY 2 DESC
          LIMIT 8
        x: source
        y: [users]

      - name: Top Countries
        type: chart
        chart: bar
        col: 4
        sql: |
          SELECT
            geo.country as country,
            COUNT(DISTINCT user_pseudo_id) as users
          FROM `bruin-landing-page.{% if filters.property == 'Bruin Cloud' %}analytics_417958677{% elif filters.property == 'Ingestr Docs' %}analytics_428962930{% else %}analytics_469869843{% endif %}.events_intraday_*`
          WHERE PARSE_DATE('%Y%m%d', event_date) >= DATE('{{ filters.date_range.start }}')
            AND PARSE_DATE('%Y%m%d', event_date) <= DATE('{{ filters.date_range.end }}')
          GROUP BY 1
          ORDER BY 2 DESC
          LIMIT 8
        x: country
        y: [users]

      - name: Event Breakdown
        type: chart
        chart: bar
        col: 4
        sql: |
          SELECT
            event_name,
            COUNT(*) as events
          FROM `bruin-landing-page.{% if filters.property == 'Bruin Cloud' %}analytics_417958677{% elif filters.property == 'Ingestr Docs' %}analytics_428962930{% else %}analytics_469869843{% endif %}.events_intraday_*`
          WHERE PARSE_DATE('%Y%m%d', event_date) >= DATE('{{ filters.date_range.start }}')
            AND PARSE_DATE('%Y%m%d', event_date) <= DATE('{{ filters.date_range.end }}')
          GROUP BY 1
          ORDER BY 2 DESC
          LIMIT 8
        x: event_name
        y: [events]

  - widgets:
      - name: Top Pages
        type: table
        col: 12
        sql: |
          SELECT
            (SELECT value.string_value FROM UNNEST(event_params) WHERE key = 'page_title' LIMIT 1) as page,
            COUNT(*) as views,
            COUNT(DISTINCT user_pseudo_id) as users
          FROM `bruin-landing-page.{% if filters.property == 'Bruin Cloud' %}analytics_417958677{% elif filters.property == 'Ingestr Docs' %}analytics_428962930{% else %}analytics_469869843{% endif %}.events_intraday_*`
          WHERE event_name = 'page_view'
            AND PARSE_DATE('%Y%m%d', event_date) >= DATE('{{ filters.date_range.start }}')
            AND PARSE_DATE('%Y%m%d', event_date) <= DATE('{{ filters.date_range.end }}')
          GROUP BY 1
          ORDER BY 2 DESC
          LIMIT 20
        columns:
          - name: page
            label: Page
          - name: views
            label: Views
            format: number
          - name: users
            label: Users
            format: number
